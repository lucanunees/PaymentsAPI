apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: fcg
  labels:
    app: payments-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
        - name: payments-api
          image: payments-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          # Variáveis do ConfigMap
          envFrom:
            - configMapRef:
                name: payments-api-config
          # Variáveis do Secret
          env:
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: ConnectionStrings__Default
            - name: RabbitMq__Host
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: RabbitMq__Host
            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: RabbitMq__Username
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: payments-api-secrets
                  key: RabbitMq__Password
          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Recursos
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always